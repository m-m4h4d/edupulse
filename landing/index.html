<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse | Learn Anywhere</title>
    <!-- Favicon from the project assets -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated background -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar glass">
        <div class="logo">
            <img src="favicon.png" alt="EduPulse Logo" class="logo-img">
            <span>EduPulse</span>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon dark-icon"></i>
            <i class="fas fa-sun light-icon"></i>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <section class="hero glass">
            <div class="hero-content">
                <span class="badge">Version 1.0.0</span>
                <h1 class="title">Empower Your Learning with <span class="gradient-text">EduPulse</span></h1>
                <p class="subtitle">A stunning, cross-platform learning management application. Seamlessly switch
                    between your mobile device and the web without missing a beat.</p>

                <div class="specifications">
                    <div class="spec-item">
                        <i class="fas fa-mobile-alt"></i>
                        <span>Cross Platform</span>
                    </div>
                    <div class="spec-item">
                        <i class="fas fa-bolt"></i>
                        <span>Lightning Fast</span>
                    </div>
                    <div class="spec-item">
                        <i class="fas fa-palette"></i>
                        <span>Dynamic Theme</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <a href="edupulse.apk" download class="btn btn-primary glow">
                        <i class="fab fa-android"></i> Download APK
                    </a>
                    <a href="https://github.com/m-m4h4d/edupulse" target="_blank" rel="noopener noreferrer"
                        class="btn btn-secondary glass-btn">
                        <i class="fab fa-github"></i> Visit GitHub
                    </a>
                    <!-- Directs back to the root where the web app runs -->
                    <a href="https://edupulse-learning.netlify.app/" target="_blank" rel="noopener noreferrer"
                        class="btn btn-accent pulse">
                        <i class="fas fa-globe"></i> Open EduPulse
                    </a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="floating-logo-container">
                    <img src="favicon.png" alt="EduPulse App Presentation" class="floating-logo">
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
